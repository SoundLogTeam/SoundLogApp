<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soundlog iOS Updated Screenshots - 2026-07-20</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b19;
        color: #f5f7ff;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      header {
        margin: 0 auto 28px;
        max-width: 1440px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }

      p {
        color: #a9afc3;
        margin: 0;
      }

      main {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        margin: 0 auto;
        max-width: 1440px;
      }

      figure {
        position: relative;
        background: #11162a;
        border: 1px solid #252d48;
        border-radius: 8px;
        margin: 0;
        overflow: hidden;
      }

      img {
        display: block;
        height: auto;
        width: 100%;
      }

      figcaption {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1;
        max-width: calc(100% - 24px);
        background: rgba(8, 11, 25, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
        padding: 8px 10px;
      }
